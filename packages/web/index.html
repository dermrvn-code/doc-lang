<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>DocLang Studio</title>

    <meta
      name="description"
      content="DSL to Markdown editor"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>

    <script type="module">
      import { runDsl } from "./src/main.ts";
      runDsl();
    </script>

    <header class="topbar">

      <div class="brand">
        <div class="brand-dot"></div>
        <span>DocLang Studio</span>
      </div>

      <div id="generation-status" class="status ready">
        Ready
      </div>

      <div class="toolbar-right">

        <button id="button-update">
          Render
        </button>
        <button id="button-save" class="secondary">
          Save to .md
        </button>

      </div>

    </header>

    <main class="workspace">

      <section class="panel editor-panel">
        <div class="panel-header">
          DocLang Input
        </div>

        <div id="monaco-editor-root"></div>
      </section>

      <section class="panel preview-panel">

        <div class="panel-header">
          Markdown Preview
        </div>

        <div id="preview-overlay" class="preview-overlay hidden">

        <div id="overlay-loading" class="overlay-content">
          <div class="spinner"></div>
          <div>Generating documentation...</div>
        </div>  

        <div id="overlay-error" class="overlay-content hidden">
          <div class="error-icon">⚠</div>
          <div class="error-title">Generation Failed</div>
          <div class="error-message">
            Check the Console / Errors panel for details
          </div>
        </div>

      </div>

        <div id="markdown-preview"></div>

      </section>

    </main>

    <details id="console-panel" class="console-panel">
      <summary>
        Console / Errors
      </summary>

      <pre id="console-output"></pre>
    </details>

  </body>
</html>
